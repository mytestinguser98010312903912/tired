<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Open veck.io in iframe</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    #viewer {
      width: 100%;
      height: 80vh;
      border: 1px solid #ccc;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <button id="openBtn">Open veck.io in iframe</button>

  <iframe id="viewer"></iframe>

  <script>
    document.getElementById('openBtn').addEventListener('click', function () {
      // Create a new empty document in the iframe using about:blank
      const iframe = document.getElementById('viewer');
      iframe.src = 'about:blank';

      // Once about:blank is loaded, write a redirecting page into it
      iframe.onload = function () {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        doc.open();
        doc.write(`
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Redirecting to veck.io</title>
          </head>
          <body>
            <p>Loading veck.io...</p>
            <script>
              // Redirect inside the iframe
              window.location.href = 'https://veck.io';
            <\/script>
          </body>
          </html>
        `);
        doc.close();
      };
    });
  </script>
</body>
</html>
