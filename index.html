<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About:Blank Injector</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <button onclick="openAndInject()">Open Veck.io in about:blank</button>

    <script>
        function openAndInject() {
            // 1. Open a new tab with about:blank
            const newWindow = window.open('about:blank', '_blank');

            if (newWindow) {
                // 2. Define the HTML to be injected
                const htmlContent = `
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>Embedded Content</title>
                        <style>
                            body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
                            iframe { width: 100%; height: 100%; border: none; }
                        </style>
                    </head>
                    <body>
                        <iframe src="https://veck.io"></iframe>
                    </body>
                    </html>
                `;

                // 3. Inject the content into the new tab
                newWindow.document.write(htmlContent);
                newWindow.document.close();
            } else {
                alert('Pop-up blocked! Please allow pop-ups for this site.');
            }
        }
    </script>
</body>
</html>
