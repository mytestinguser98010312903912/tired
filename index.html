<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Open veck.io in about:blank iframe</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
  </style>
</head>
<body>
  <button id="openBtn">Open veck.io in new tab (about:blank with iframe)</button>

  <script>
    document.getElementById('openBtn').addEventListener('click', function () {
      // 1. Open a new about:blank window/tab
      const newWin = window.open('about:blank', '_blank');

      if (!newWin) {
        alert('Popup blocked. Please allow popups for this site.');
        return;
      }

      // 2. Inject HTML into the about:blank window
      const doc = newWin.document;

      doc.open();
      doc.write(`
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8" />
          <title>veck.io in iframe</title>
          <style>
            body {
              margin: 0;
              font-family: sans-serif;
            }
            iframe {
              width: 100vw;
              height: 100vh;
              border: none;
            }
          </style>
        </head>
        <body>
          <iframe src="https://veck.io" allow="fullscreen"></iframe>
        </body>
        </html>
      `);
      doc.close();
    });
  </script>
</body>
</html>
