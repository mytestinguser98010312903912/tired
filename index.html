<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About:Blank Injector</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column; /* Stack buttons vertically */
            gap: 20px;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
            width: 280px; /* Fixed width for alignment */
        }
        button:hover {
            background-color: #0056b3;
        }
        .popup-btn {
            background-color: #28a745;
        }
        .popup-btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <button onclick="openAndInject('_blank')">Open in New Tab</button>
    <button class="popup-btn" onclick="openAndInject('popup')">Open in New Popup</button>

    <script>
        function openAndInject(mode) {
            let newWindow;
            
            const htmlContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Embedded Content</title>
                    <style>
                        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
                        iframe { width: 100%; height: 100%; border: none; }
                    </style>
                </head>
                <body>
                    <iframe src="https://www.securly.com/blocked?useremailexample.com&reason=domainblockedforuser&categoryid=67109120&policyid=4&keyword=&url=bXJzaGVsdGVyLnh5ei8=&ver=-&extension_id=ckecmkbnoanpgplccmnoikfmpcdladkc&extension_version=3.0.38&internal_ip=10.21.60.49"></iframe>
                </body>
                </html>
            `;

            if (mode === 'popup') {
                // Defines the size and position of the popup window
                const features = 'width=800,height=600,left=200,top=200,resizable=yes,scrollbars=yes';
                newWindow = window.open('about:blank', '_blank', features);
            } else {
                // Standard new tab behavior
                newWindow = window.open('about:blank', '_blank');
            }

            if (newWindow) {
                newWindow.document.write(htmlContent);
                newWindow.document.close();
            } else {
                alert('Pop-up blocked! Please allow pop-ups for this site.');
            }
        }
    </script>
</body>
</html>
